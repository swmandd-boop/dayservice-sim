<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>デイサービス経営シミュレーター｜自事業所の経営課題を自己診断｜株式会社福祉マネジメント＆デザイン</title>
<meta name="description" content="デイサービスの経営を12ヶ月シミュレーションし、自事業所の経営課題を自己診断できる無料ツール。稼働率・要介護度別単価・加算・人材定着・資金繰りが、どう収支に跳ね返るかを体験できます。">
<meta property="og:title" content="デイサービス経営シミュレーション">
<meta property="og:description" content="良いケアを提供していさえすれば、経営は回るのか。デイサービスの経営を12ヶ月体験し、自事業所の課題を整理できる無料の自己診断ツールです。">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0e5e5a">
<meta name="version" content="v4.7.1-2026-07-19">
<style>

      :root{--ink:#15303a;--paper:#e6ecea;--card:#fff;--line:#d5ddda;--teal:#0e5e5a;--teal-d:#0a4442;
        --amber:#d98a2b;--green:#2f8f6b;--clay:#c15334;--violet:#6a5aa8;--slate:#4a7396;--muted:#6b7d7a;
        --font:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;}
      body{min-height:100%;background:radial-gradient(120% 90% at 100% 0%,#f0f4f2 0%,var(--paper) 55%);
        padding:24px 16px;font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;box-sizing:border-box;}
      .frame{max-width:640px;margin:0 auto;}
      *{box-sizing:border-box;font-variant-numeric:tabular-nums;}
      .cta{width:100%;margin-top:22px;padding:16px;border:none;border-radius:14px;background:var(--teal);color:#fff;
        font-size:16px;font-weight:700;letter-spacing:.02em;cursor:pointer;font-family:var(--font);transition:transform .08s,background .2s;}
      .cta:hover{background:var(--teal-d);}.cta:active{transform:translateY(1px);}

      .start{padding:12px 4px;}
      .eyebrow{font-size:12px;letter-spacing:.22em;color:var(--teal);font-weight:700;text-transform:uppercase;margin-bottom:14px;}
      .title{font-size:34px;line-height:1.28;font-weight:800;margin:0 0 18px;}
      .title-accent{color:var(--teal);border-bottom:6px solid var(--amber);padding-bottom:2px;}
      .lead{font-size:15px;line-height:1.9;color:#3a4f56;margin:0 0 28px;}
      .mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
      .mode-card{text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;font-family:var(--font);transition:border-color .2s,transform .08s;}
      .mode-card:hover{border-color:var(--teal);transform:translateY(-2px);}
      .mode-card.primary{border-color:var(--teal);box-shadow:0 8px 24px -14px rgba(14,94,90,.6);}
      .mode-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--teal);background:#e3efec;padding:3px 10px;border-radius:20px;}
      .mode-len{font-size:26px;font-weight:800;margin:10px 0 6px;}.mode-desc{font-size:12.5px;line-height:1.7;color:var(--muted);}
      .fineprint{margin-top:24px;font-size:11.5px;color:var(--muted);}

      .phead{display:flex;justify-content:space-between;align-items:flex-start;background:var(--ink);color:#fff;border-radius:16px;padding:18px 20px;margin-bottom:16px;}
      .phead-month{font-size:20px;font-weight:800;}.phead-total{font-size:13px;font-weight:500;color:#9db4b0;}
      .phead-progress{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap;}
      .pip{width:14px;height:5px;border-radius:3px;background:#33484f;}.pip.done{background:var(--green);}.pip.now{background:var(--amber);}
      .phead-right{text-align:right;}.phead-funds-label{font-size:11px;color:#9db4b0;letter-spacing:.08em;}
      .phead-funds{font-size:23px;font-weight:800;}.phead-funds.neg{color:#ff9b7a;}
      .phead-recv{font-size:11px;color:#9db4b0;margin-top:2px;}
      .phead-pl{font-size:12px;font-weight:700;margin-top:3px;}

      .meters{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
      .meter{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
      .meter-wide{grid-column:span 2;}
      .meter-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
      .meter-label{font-size:11.5px;color:var(--muted);font-weight:600;}.meter-val{font-size:17px;font-weight:800;}
      .meter-track{height:7px;background:#eef2f0;border-radius:5px;overflow:hidden;}
      .meter-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1);}
      .staff-dots{display:flex;gap:4px;flex-wrap:wrap;}
      .dot{width:12px;height:12px;border-radius:50%;background:#e3e9e7;border:1px solid var(--line);}
      .dot.on{background:var(--teal);border-color:var(--teal);}

      .event{border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid;border-left-width:5px;}
      .ev-good{background:#e9f5ef;border-color:#b6ddc9;border-left-color:var(--green);}
      .ev-bad{background:#fff7ec;border-color:#f0d3a6;border-left-color:var(--amber);}
      .ev-disaster{background:#fbeee9;border-color:#f0cabb;border-left-color:var(--clay);}
      .event-tag{font-size:11px;font-weight:700;letter-spacing:.14em;}
      .ev-good .event-tag{color:var(--green);}.ev-bad .event-tag{color:var(--amber);}.ev-disaster .event-tag{color:var(--clay);}
      .event-title{font-size:17px;font-weight:800;margin:4px 0;}
      .event-desc{font-size:13px;line-height:1.7;color:#5c6360;}
      .event-mitig{font-size:12px;font-weight:700;color:var(--green);background:#dbf0e5;border-radius:8px;padding:8px 11px;margin-top:9px;line-height:1.6;}
      .event-nomitig{font-size:12px;font-weight:700;color:var(--clay);background:#f7ded4;border-radius:8px;padding:8px 11px;margin-top:9px;line-height:1.6;}
      .perma{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
      .perma-chip{font-size:11px;font-weight:700;color:var(--clay);background:#fbeee9;border:1px solid #f0cabb;
        padding:5px 10px;border-radius:20px;}
      .ev-choice{background:#f3f1fb;border-color:#cfc7ec;border-left-color:var(--violet);}
      .ev-choice .event-tag{color:var(--violet);}
      .choices{display:flex;flex-direction:column;gap:7px;margin-top:11px;}
      .choice{text-align:left;background:#fff;border:1.5px solid #d8d2ee;border-radius:9px;padding:10px 12px;
        cursor:pointer;font-family:var(--font);transition:border-color .15s,background .15s;}
      .choice.on{border-color:var(--violet);background:#ece8f8;}
      .choice-label{font-size:13px;font-weight:700;color:var(--ink);line-height:1.5;}
      .choice-sub{font-size:11px;color:#6a628f;margin-top:3px;line-height:1.55;}
      .chosennote{font-size:12.5px;color:#4b4570;background:#f3f1fb;border:1px solid #cfc7ec;border-radius:10px;
        padding:11px 14px;margin-bottom:12px;}.chosennote b{font-weight:800;}

      .warns{margin-bottom:14px;display:flex;flex-direction:column;gap:6px;}
      .warn{font-size:12.5px;color:var(--clay);background:#fbeee9;border-radius:8px;padding:8px 12px;line-height:1.6;}

      /* 経営方針 */
      .policy{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
      .policy-head{font-size:13px;font-weight:700;margin-bottom:10px;}
      .policy-head small{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:3px;line-height:1.6;}
      .policy-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
      .pol{padding:11px 10px;border:1.5px solid var(--line);border-radius:9px;background:#f6f9f7;
        font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:var(--font);
        transition:border-color .15s,background .15s,color .15s;text-align:left;}
      .pol:hover{border-color:var(--teal);}
      .pol.on{border-color:var(--teal);background:var(--teal);color:#fff;}
      .policy-detail{margin-top:11px;padding:11px 13px;background:#f2f6f4;border-radius:9px;}
      .pd-desc{font-size:12px;line-height:1.7;color:var(--ink);}
      .pd-trade{font-size:11.5px;line-height:1.6;color:var(--clay);margin-top:6px;font-weight:600;}
      .policy-drift{margin-top:10px;padding:10px 13px;background:#fff7ec;border:1px solid #f0d3a6;border-radius:9px;}
      .policy-drift b{font-size:11.5px;color:var(--amber);display:block;margin-bottom:4px;}
      .pd-item{font-size:11.5px;color:#6a5a3a;line-height:1.7;}

      .levers{display:flex;flex-direction:column;gap:14px;}
      .lever{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
      .lever-head{font-size:13px;font-weight:700;margin-bottom:10px;}
      .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;background:#eef2f0;padding:4px;border-radius:10px;}
      .seg-btn{padding:10px 4px;border:none;border-radius:8px;background:transparent;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;font-family:var(--font);transition:background .15s,color .15s;}
      .seg-btn.active{background:var(--teal);color:#fff;box-shadow:0 2px 8px -3px rgba(14,94,90,.7);}
      .lever-hint{font-size:11.5px;color:var(--muted);margin-top:9px;line-height:1.6;}

      .initiatives{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:14px;}
      .init-head{font-size:13px;font-weight:700;margin-bottom:10px;}
      .init-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
      .init-chip{text-align:left;background:#f6f9f7;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;font-family:var(--font);transition:border-color .15s,background .15s;}
      .init-chip.on{border-color:var(--teal);background:#e8f2ef;}
      .init-chip-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px;}
      .init-name{font-size:13.5px;font-weight:700;color:var(--ink);}.init-cost{font-size:11.5px;font-weight:700;color:var(--clay);white-space:nowrap;}
      .init-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.55;}
      .init-total{font-size:12.5px;color:var(--muted);margin-top:11px;text-align:right;}.init-total b{color:var(--ink);font-size:14px;}

      /* 管理者の工数 */
      .hours{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:14px;}
      .hours-head{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:700;margin-bottom:12px;}
      .hours-budget{font-size:12px;color:var(--muted);font-weight:700;}
      .hours-care{background:#f2f6f4;border-radius:10px;padding:11px 13px;margin-bottom:12px;}
      .hc-row{display:flex;justify-content:space-between;align-items:baseline;}
      .hc-label{font-size:12.5px;font-weight:700;color:var(--ink);}
      .hc-val{font-size:17px;font-weight:800;color:var(--clay);}
      .hc-note{font-size:11px;color:var(--clay);line-height:1.6;margin-top:5px;}
      .hc-note.ok{color:var(--green);}
      .hc-remain{font-size:12px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);}
      .hc-remain b{font-size:15px;color:var(--ink);}
      .hc-deleg{color:var(--teal);font-weight:700;}
      .hours-warn{font-size:12px;line-height:1.6;color:var(--clay);background:#fbeee9;border:1px solid #f0cabb;
        border-radius:9px;padding:9px 12px;margin-bottom:12px;}
      .hsliders{display:flex;flex-direction:column;gap:12px;}
      .hslider{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#f9fbfa;}
      .hslider.full{border-color:#b6ddc9;background:#f2f9f5;}
      .hslider.part{border-color:#f0d3a6;background:#fffaf2;}
      .hslider.short{border-color:#f0cabb;background:#fdf3ef;}
      .hs-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
      .hs-label{font-size:12.5px;font-weight:700;}
      .hs-num{font-size:14px;font-weight:800;}.hs-num small{font-size:11px;color:var(--muted);font-weight:600;}
      .hslider input[type=range]{width:100%;margin:2px 0 6px;accent-color:var(--teal);}
      .hs-bar{height:5px;background:#e6ebe9;border-radius:4px;overflow:hidden;}
      .hs-fill{height:100%;border-radius:4px;transition:width .25s;}
      .full .hs-fill{background:var(--green);}.part .hs-fill{background:var(--amber);}.short .hs-fill{background:var(--clay);}
      .hs-pen{font-size:10.5px;line-height:1.55;color:var(--muted);margin-top:6px;}
      .short .hs-pen{color:var(--clay);font-weight:600;}

      /* 結果画面：時間レポート */
      .hreport{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:14px;}
      .hreport-title{font-size:12.5px;font-weight:800;margin-bottom:11px;}
      .hr-care{font-size:12px;line-height:1.6;color:var(--clay);background:#fbeee9;border-radius:8px;padding:9px 11px;margin-bottom:10px;}
      .hr-rows{display:flex;flex-direction:column;gap:6px;}
      .hr-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;font-size:12.5px;padding:7px 10px;border-radius:8px;}
      .hr-row.full{background:#f2f9f5;}.hr-row.part{background:#fffaf2;}.hr-row.short{background:#fdf3ef;}
      .hr-label{font-weight:700;}
      .hr-num{color:var(--muted);font-size:11.5px;font-weight:700;}
      .hr-badge{font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap;}
      .full .hr-badge{color:var(--green);background:#dbf0e5;}
      .part .hr-badge{color:var(--amber);background:#fbecd6;}
      .short .hr-badge{color:var(--clay);background:#f7ded4;}
      .hr-alert{font-size:12px;line-height:1.6;color:var(--clay);background:#fbeee9;border:1px solid #f0cabb;
        border-radius:8px;padding:9px 11px;margin-top:10px;font-weight:700;}

      .preview{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
      .pv-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
      .pv-label{font-size:11.5px;font-weight:700;color:var(--muted);display:block;}
      .pv-occ{font-size:26px;font-weight:800;color:var(--teal);}.pv-occ.hot{color:var(--clay);}
      .pv-sub{font-size:11px;color:var(--muted);margin-left:6px;}
      .pv-risk{font-size:22px;font-weight:800;}.pv-risk small{font-size:12px;font-weight:600;color:var(--muted);}
      .risk-bar{height:6px;background:#eef2f0;border-radius:5px;overflow:hidden;margin-top:7px;}.risk-fill{height:100%;border-radius:5px;transition:width .3s;}
      .risk-low .pv-risk{color:var(--green);}.risk-low .risk-fill{background:var(--green);}
      .risk-mid .pv-risk{color:var(--amber);}.risk-mid .risk-fill{background:var(--amber);}
      .risk-high .pv-risk{color:var(--clay);}.risk-high .risk-fill{background:var(--clay);}

      .result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:6px;}
      .result-month{font-size:14px;font-weight:700;color:var(--muted);}
      .result-verdict{font-size:23px;font-weight:800;}.result-verdict.profit{color:var(--green);}.result-verdict.loss{color:var(--clay);}
      .tug{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
      .tug-cap{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:12px;}
      .tug-row{display:flex;align-items:center;gap:10px;}.tug-row+.tug-row{margin-top:12px;}
      .tug-label{width:32px;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
      .tug-track{flex:1;height:22px;background:#eef2f0;border-radius:6px;overflow:hidden;}
      .tug-fill{height:100%;border-radius:6px;transition:width .7s cubic-bezier(.4,0,.2,1);}
      .tug-fill.income{background:linear-gradient(90deg,var(--teal),var(--green));}
      .tug-fill.expense{background:linear-gradient(90deg,#d98a2b,var(--clay));}
      .tug-num{width:96px;text-align:right;font-size:13px;font-weight:800;flex-shrink:0;}

      .bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
      .bd-col{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
      .bd-col-title{font-size:12px;font-weight:800;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
      .income-t{color:var(--green);}.expense-t{color:var(--clay);}
      .row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:#3a4f56;gap:8px;}
      .row-v{font-weight:700;color:var(--ink);white-space:nowrap;}
      .bd-note{font-size:11px;color:var(--clay);margin-top:8px;line-height:1.6;}

      .cash{background:#eef4fb;border:1px solid #c9d8ec;border-radius:12px;padding:15px;margin-bottom:14px;}
      .cash-title{font-size:12.5px;font-weight:800;color:#2b4a72;margin-bottom:10px;}.cash-title small{font-weight:600;color:#5b7196;}
      .cash-rows .row{color:#3a4f56;}
      .cash-net,.cash-bal{display:flex;justify-content:space-between;font-size:13.5px;font-weight:800;padding:7px 0;border-top:1px solid #c9d8ec;margin-top:4px;}
      .cash-net .profit,.cash-bal .profit{color:var(--green);}.cash-net .loss{color:var(--clay);}
      .cash-bal{font-size:15px;}
      .cash-note{font-size:11.5px;line-height:1.6;color:#2b4a72;margin-top:10px;background:#dde9f7;border-radius:8px;padding:9px 11px;}
      .cash-warn{font-size:12px;line-height:1.6;color:var(--clay);margin-top:10px;background:#fbeee9;border:1px solid #f0cabb;border-radius:8px;padding:9px 11px;font-weight:700;}

      .applied{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
      .applied-label{font-size:11.5px;font-weight:700;color:var(--muted);}
      .applied-chip{font-size:12px;font-weight:700;color:var(--teal);background:#e8f2ef;border:1px solid #bcdcd5;padding:4px 11px;border-radius:20px;}
      .auditnote{font-size:12.5px;line-height:1.7;color:#4b4570;background:#f3f1fb;border:1px solid #cfc7ec;border-radius:10px;padding:11px 14px;margin-bottom:12px;}
      .accident{font-size:12.5px;line-height:1.7;color:var(--clay);background:#fbeee9;border:1px solid #f0cabb;border-radius:10px;padding:11px 14px;margin-bottom:12px;}

      .delta-panel{background:#f2f6f4;border:1px solid var(--line);border-radius:12px;padding:16px;}
      .delta-panel-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;}
      .delta-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;}
      .drow{display:flex;align-items:center;justify-content:space-between;gap:8px;}
      .drow-label{font-size:12.5px;font-weight:700;}.drow-nums{font-size:12.5px;color:var(--muted);margin-left:auto;}.drow-nums b{color:var(--ink);}
      .delta{font-size:11.5px;font-weight:800;padding:2px 7px;border-radius:20px;flex-shrink:0;}
      .delta.up{color:var(--green);background:#e4f2ec;}.delta.down{color:var(--clay);background:#fbeee9;}.delta.flat{color:var(--muted);background:#e9efec;}
      .churn{margin-top:12px;font-size:12.5px;line-height:1.7;color:var(--clay);background:#fbeee9;border-radius:8px;padding:10px 12px;}

      .end{padding:8px 4px;}
      .end-tier{font-size:40px;font-weight:800;margin:8px 0 22px;}
      .t-great{color:var(--green);}.t-good{color:var(--teal);}.t-warn{color:var(--amber);}.t-bad{color:var(--clay);}
      .end-figures{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
      .end-fig{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;}
      .end-fig-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;}
      .end-fig-val{font-size:23px;font-weight:800;}.end-fig-val.profit{color:var(--green);}.end-fig-val.loss{color:var(--clay);}
      .end-cashwarn{font-size:12.5px;line-height:1.7;color:var(--clay);background:#fbeee9;border:1px solid #f0cabb;border-radius:10px;padding:12px 14px;margin-bottom:24px;}

  <p>
    <b>本ツールについて</b>
    研修・学習を目的とした教材です。登場する単価・加算・費用などの数値は、経営の構造を体感しやすくするために
    <strong>簡略化した架空のモデル</strong>であり、実際の介護報酬・人員配置基準・各種加算の算定要件とは異なります。

  </p>

<script>
"use strict";
/* ===================== ゲームロジック層 ===================== */
/* =========================================================================
   デイサービス経営シミュレーション（研修用プロトタイプ v3）
   ---------------------------------------------------------------------------
   経営実態を反映した要素：
   ・定員稼働率（管理者が最も見るKPI）と定員上限
   ・満足度/定着度/適正運営度は「水準」に自然収束（放置すると戻る＝維持が要る）
   ・人員配置基準（利用者数に対する必要職員。割ると加算不可・適正運営度低下）
   ・過密運営ペナルティ（定員ギリギリは質・定着を削り事故を招く）
   ・介護報酬は約2ヶ月遅れで入金 → 発生損益(黒字/赤字)と手元現金が乖離する
   ★ 係数はすべて CONFIG に集約。ここを触ればバランス調整できる。
   ========================================================================= */

const CONFIG = {
  base: {
    initFunds: 4_000_000, initSat: 60, initStaff: 10, initRet: 60, initComp: 60,
    // 開始時の利用者構成（要介護度別・計38名。初月需要≈358回≈稼働65%）
    initMix: { yousien: 4, k1: 9, k2: 11, k3: 8, k4: 4, k5: 2 },
    mixShift: 0.18, // 受入方針に応じて構成が毎月このくらい寄っていく
    fixedCost: 1_750_000, staffCost: 280_000, maxDaysPerUser: 12,
    // --- 職員の職種別人件費（WAM＋運営基準）。「職員数」＝管理者含む全従事者の常勤換算 ---
    // 固定コア＝管理者1・生活相談員1・看護1（各30万）＋介護正規2（各25万）＝5名・140万。
    // 非正規P＝staff−5（人件費・最低賃金の対象）。介護換算数C＝介護正規2＋P＝staff−3。
    coreStaff: 5, coreWage: 1_400_000, partWage: 190_000, employerBurden: 1.15,
    // 経費は「収入×経費率」で構造化（実額固定をやめ、収入変動でも経費率が安定）
    adminExpenseRate: 0.18, // 事務費＝収入の18%（家賃・光熱・通信・減価償却）
    serviceExpenseRate: 0.07, // 事業費＝収入の7%（食材・消耗品）→ 合計経費率25%
    teiin: 25, operatingDays: 22, // 定員 × 稼働日 = 月間定員回数
    usersMin: 20, usersMax: 60, staffMin: 2, staffMax: 14, retBomb: 40,
    receivableSeed: 3_400_000, // 開始時の売掛（過去2ヶ月分の報酬）
    initBcp: 25, bcpDecay: 2, // BCP対策度（備え）と月次の自然減衰
    // staffCostUp / priceDown は最低賃金・報酬改定カードで恒久的に加算される
    drawRate: 0.75, // 毎月イベントカードを引く確率
    managerHours: 160, // 管理者の月間持ち時間
    managerBaseCare: 40, // 管理者が常に現場に入る時間（デイの管理者は兼務が実態）
    accident: { dSat: 12, dUsers: 3, dComp: 5, cost: 150_000 },
  },
  // ① 受入方針
  intake: {

/* ------------------------- 資金繰りの見える化（先行投資の判断材料） -------------------------
   介護報酬は約2ヶ月遅れで入る。今月の取組費用は「今」出ていくが、その効果で増えた収入は
   2ヶ月後にしか入らない。この時間差を見せないと、先行投資の判断ができない。
------------------------------------------------------------------------------------- */
function cashForecast(state, projectedIncome, projectedExpense) {
  const [in1, in2] = state.pipeline; // in1=来月入金, in2=再来月入金
  const now = state.funds;
  // 今月：in1 が入り、今月の支出が出る
  const m0 = now + in1 - projectedExpense;
  // 来月以降は支出が今月並みと仮定した粗い見通し
  const m1 = m0 + in2 - projectedExpense;
  const m2 = m1 + projectedIncome - projectedExpense;
  return {
    incoming: [in1, in2, projectedIncome], // 今月・来月・再来月に入る金額
    balance: [m0, m1, m2],                  // 各月末の手元現金（見通し）
    lowest: Math.min(m0, m1, m2),
    risky: Math.min(m0, m1, m2) < 500000,
  };
}

/* ---------------------- 組織の健全性診断（結果を数字だけで見せない） ----------------------
   黒字でも、満足度・定着度・適正運営度が壊れていれば、その先は続かない。
   短い期間だと「手を抜いても儲かる」ように見えてしまうため、それを言葉で補う。
--------------------------------------------------------------------------------- */
function diagnoseHealth(state) {
  const issues = [];
  if (state.ret < 45) issues.push({ level: "bad", text: "職員の定着度が低いままです。この先、離職の連鎖が起きます。" });
  else if (state.ret < 53) issues.push({ level: "warn", text: "職員の定着度が下がっています。人が抜け始める水準です。" });

  if (state.comp < 35) issues.push({ level: "bad", text: "記録・書類が崩れています。実地指導が入れば加算の返還は避けられません。" });
  else if (state.comp < 50) issues.push({ level: "warn", text: "記録の整備が追いついていません。監査に耐えられない恐れがあります。" });

  if (state.sat < 40) issues.push({ level: "bad", text: "利用者の満足度が低く、利用者離れが進みます。" });
  else if (state.sat < 52) issues.push({ level: "warn", text: "満足度が下がっています。稼働率にじわじわ効いてきます。" });

  if (state.staff < CONFIG.base.coreStaff) issues.push({ level: "bad", text: "コア職員を割っています。基本報酬の減算対象です。増員で解消を。" });
  if (state.bcp < 25) issues.push({ level: "warn", text: "災害への備えがほとんどありません。" });
  return issues;
}

function policyDrift(policy, decision) {
  if (!policy) return [];
  const p = POLICIES[policy]; if (!p) return [];
  const drift = [];
  const nm = { intake: "受入方針", admission: "受入層", care: "ケアの手厚さ", staffing: "人員体制", kasan: "加算体制" };
  for (const k of ["intake", "admission", "care", "staffing", "kasan"]) {
    if (decision[k] !== p.set[k]) {
      const from = CONFIG[k][p.set[k]].label, to = CONFIG[k][decision[k]].label;
      drift.push(`${nm[k]}：${from} → ${to}`);
    }
  }
  return drift;
}

// 災害・一部の試練は BCP対策度で被害が軽減される
function applyMitigation(card, state) {
  const c = { ...card };
  if (card.bcpMitig) {
    const m = state.bcp / 100;
    if (c.occMult != null) c.occMult = 1 - (1 - c.occMult) * (1 - 0.6 * m); // 稼働ダメージ最大60%減
    if (c.cost) c.cost = Math.round(c.cost * (1 - 0.5 * m));                 // 復旧コスト最大50%減
    if (c.satShock) c.satShock = Math.round(c.satShock * (1 - 0.5 * m));
    c.mitigated = m > 0.4;
  }
  if (card.compMitig) {
    const m = state.comp / 100;
    if (c.satShock) c.satShock = Math.round(c.satShock * (1 - 0.5 * m));
    c.mitigated = m > 0.6;
  }
  return c;
}

function drawCard(state, month, totalMonths) {
  // 第1月は判断に集中させるためカードなし
  if (month === 1) return null;
  if (Math.random() > CONFIG.base.drawRate) return null;
  const calMonth = ((month + 2) % 12) + 1; // 第1月を4月として季節を割り当てる
  const pool = CARDS.filter((c) => {
    if (c.season && !c.season.includes(calMonth)) return false;
    // 最低賃金は1プレイ1回まで（staffCostUp>0＝発生済みフラグ。恒久累積なので再抽選から除外）
    if (c.staffCostUp && (state.staffCostUp || 0) > 0) return false;
    if (c.reqSat && state.sat < c.reqSat) return false;
    if (c.reqSatBelow && state.sat >= c.reqSatBelow) return false;
    if (c.reqRet && state.ret < c.reqRet) return false;
    return true;
  });
  if (!pool.length) return null;
  const wOf = (c) => (typeof c.w === "function" ? c.w(state) : c.w);
  const total = pool.reduce((s, c) => s + wOf(c), 0);
  let r = Math.random() * total;
  for (const c of pool) { r -= wOf(c); if (r <= 0) return applyMitigation(c, state); }
  return applyMitigation(pool[pool.length - 1], state);
}

   デイの単価は要介護度で大きく変わる。重度者ほど単価は高いが、手間もかかり、
   職員1人が回せる人数は減る。一方で来所頻度は高く、休みにくい。
   → 「頭数を集めて稼働率を上げる」か「重度を受けて単価を上げる」かで
      必要な職員数も戦略も変わる。これが経営の分かれ道になる。
========================================================================= */
const LEVELS = [
  { key: "yousien", label: "要支援", num: 0.5, price: 6_300,  load: 0.70, days: 9,  attend: 0.70 },
  { key: "k1", label: "要介護1", num: 1, price: 8_500,  load: 1.00, days: 11, attend: 0.74 },

  { key: "k5", label: "要介護5", num: 5, price: 14_300, load: 2.00, days: 14, attend: 0.88 },
];

/* 表示用に整数化する。内部は小数で保持しているが、画面では整数で見せる。
   単純な四捨五入だと「内訳の合計」と「総数」が食い違い、検算した人の信用を失う。
   最大剰余法（Largest Remainder Method）で、合計が必ず一致するよう配分する。 */
function displayMix(mix) {
  const total = LEVELS.reduce((a, L) => a + (mix?.[L.key] || 0), 0);
  const target = Math.round(total);
  const floors = LEVELS.map((L) => {
    const v = mix?.[L.key] || 0;
    return { key: L.key, floor: Math.floor(v), rem: v - Math.floor(v) };
  });
  let assigned = floors.reduce((a, f) => a + f.floor, 0);
  // 端数の大きい順に、目標人数に届くまで1名ずつ足す
  const order = [...floors].sort((a, b) => b.rem - a.rem);
  let i = 0;
  while (assigned < target && i < order.length * 3) {
    order[i % order.length].floor += 1;
    assigned += 1;
    i += 1;
  }
  // 万一超えたら、端数の小さい順に削る
  const rev = [...floors].sort((a, b) => a.rem - b.rem);
  let j = 0;
  while (assigned > target && j < rev.length * 3) {
    if (rev[j % rev.length].floor > 0) { rev[j % rev.length].floor -= 1; assigned -= 1; }
    j += 1;
  }
  const out = { total: target };
  floors.forEach((f) => { out[f.key] = f.floor; });
  return out;
}

// 利用者構成から、平均単価・平均要介護度・手間・来所需要を計算する
function analyzeMix(mix) {
  const total = LEVELS.reduce((a, L) => a + (mix[L.key] || 0), 0);
  if (!total) return { total: 0, avgPrice: 0, avgLevel: 0, avgLoad: 1, demand: 0 };
  let sp = 0, sl = 0, sn = 0, demand = 0;
  for (const L of LEVELS) {
    const n = mix[L.key] || 0;
    sp += L.price * n; sl += L.load * n; sn += L.num * n;
    demand += n * L.days * L.attend; // 各層の月間来所需要
  }
  return {
    total,
    avgPrice: sp / total,
    avgLoad: sl / total,
    avgLevel: sn / total,
    demand,
  };
}

/* ======================= 管理者の工数（このゲームの背骨） =======================
   デイサービスは管理者が兼務で全部やる。ケアも、請求も、記録も、営業も、家族対応も。

   ・現場穴埋めは削れない（利用者が来ている以上、穴は埋めるしかない）＝最優先で消費
   ・足りない分は、事務／営業／職員ケア／家族対応 のどれかを削るしかない
   ・削った代償は、数ヶ月後に返戻・利用者減・離職・苦情として返ってくる
   ・定着の高い職員には事務を任せられる（＝人への投資が「時間」として報われる）
     逆に定着が低いと「人はいるのに任せられない」＝管理者が抱え込む
============================================================================= */
const TASKS = {
  care:   { key: "care",   label: "現場の穴埋め", fixed: true,  desc: "職員が足りない分、管理者が現場に入る。削れない。" },
  admin:  { key: "admin",  label: "請求・記録・加算事務", desc: "削ると適正運営度が下がり、加算の算定に支障が出る。" },
  sales:  { key: "sales",  label: "営業・ケアマネ回り", desc: "削ると紹介が細り、利用者が減っていく。" },
  people: { key: "people", label: "職員面談・シフト調整", desc: "削ると定着度が下がる。人は静かに離れていく。" },
  family: { key: "family", label: "家族対応・苦情処理", desc: "削ると満足度が下がる。苦情が放置される。" },
};

// 各業務に「本来必要な時間」を算出する
function requiredHours(state, decision, reqStaff) {
  // reqStaff＝必要人員(質基準)の切り上げ。不足は管理者の現場穴埋め、余剰は事務委譲に回る
  const shortage = Math.max(0, reqStaff - state.staff);
  // 管理者は常に現場を一定時間持つ（兼務）。職員が足りなければ、その穴埋めが上乗せされる
  const care = CONFIG.base.managerBaseCare + shortage * 35 + (decision.intake === "high" ? 12 : 0);

  const userCount = LEVELS.reduce((a, L) => a + (state.mix?.[L.key] || 0), 0);
  let admin = 36 + (decision.kasan === "standard" ? 15 : decision.kasan === "active" ? 28 : 0) + Math.round(userCount * 0.35);
  // 基準を超える余剰職員に、定着度に応じて事務を分担できる
  const surplus = Math.max(0, state.staff - reqStaff);
  const delegable = Math.round(surplus * 10 * (state.ret / 100));
  admin = Math.max(20, admin - delegable);

  const sales = 28;
  const people = Math.min(40, state.staff * 4) + (state.ret < 50 ? 18 : 0);
  const family = 18 + (state.sat < 50 ? 18 : 0);

  return { care, admin, sales, people, family, delegable };
}

// 削った時間に応じたペナルティ（充足率が低いほど痛い）
function shortfallPenalty(task, ratio) {
  const miss = clamp(1 - ratio, 0, 1); // 0=満たした, 1=まったくできなかった
  switch (task) {
    case "admin":  return { compT: -Math.round(miss * 30), billing: miss > 0.55 };
    case "sales":  return { usersT: -Math.round(miss * 7) };
    case "people": return { retT: -Math.round(miss * 26) };
    case "family": return { satT: -Math.round(miss * 22) };
    default: return {};
  }
}


/* ------------------------------ ユーティリティ ------------------------------ */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const conv = (cur, tgt, rate) => cur + (tgt - cur) * rate;
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const signYen = (n) => (n >= 0 ? "+" : "−") + "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
const abbrInit = (l) => ({ "営業強化": "営", "スポットレク": "レク", "職員研修": "研", "記録・書類の整備": "記録" }[l] || l);

/* ------------------- 1ヶ月の試算（確定的・事故抽選は含めない） ------------------- */
function project(state, decision, event) {
  const B = CONFIG.base;
  const c = CONFIG.care[decision.care], ik = CONFIG.intake[decision.intake];
  const st = CONFIG.staffing[decision.staffing], ka = CONFIG.kasan[decision.kasan];
  const ev = event || {};

  // 施策
  const cond = 0.5 + state.ret / 100;
  const inits = decision.initiatives || [];
  let initCost = 0, satTb = 0, retTb = 0, compTb = 0, occMultI = 1, salesUsers = 0;
  if (inits.includes("sales")) { initCost += CONFIG.initiatives.sales.cost; salesUsers = CONFIG.initiatives.sales.users; }
  if (inits.includes("spotrec")) { const i = CONFIG.initiatives.spotrec; initCost += i.cost; satTb += Math.round(i.satBoost * cond); occMultI *= 1 + i.occBoost * cond; }
  if (inits.includes("training")) { const i = CONFIG.initiatives.training; initCost += i.cost; retTb += i.retBoost; satTb += i.satBoost; compTb += i.compBoost; occMultI *= i.occMult; }
  if (inits.includes("records")) { const i = CONFIG.initiatives.records; initCost += i.cost; compTb += i.compBoost; }
  let bcpBoost = 0;
  if (inits.includes("bcp")) { const i = CONFIG.initiatives.bcp; initCost += i.cost; bcpBoost += i.bcpBoost; }

  // 人員レバー: 下限はコア5名（プレイヤーは操作でコア割れを選べない）。
  // イベント(離職等)でコア割れ中は、レバーでの削減は不可・増員のみ可。
  const dStaffLever = st.dStaff < 0 && state.staff + st.dStaff < B.coreStaff ? 0 : st.dStaff;
  const staff = clamp(state.staff + dStaffLever, B.staffMin, B.staffMax);
  // レバー効果(retT/compT)は実際に人数が動いた月のみ（上限・下限到達時の無償効果を廃止）
  const staffChanged = staff !== state.staff;
  const stRetT = staffChanged ? st.retT : 0;
  const stCompT = staffChanged ? st.compT : 0;

  // 介護換算数C＝介護正規2＋非正規（イベント欠員は非正規→介護正規の順）。C=0なら受入0。
  const C = Math.max(0, staff - 3);
  // 層1: 受入上限（崖）＝配置基準の趣旨に沿った簡易モデル。係数はレバー設定に即時追従。
  const loadAll = c.loadF * CONFIG.admission[decision.admission].loadF * ka.loadF;
  const capDay = C >= 1 ? Math.floor((15 + 5 * (C - 1)) * c.capF * CONFIG.admission[decision.admission].capF * ka.capF) : 0;
  const hijunCap = capDay * B.operatingDays; // 受入上限（回/月）
  // コア割れ（職員5名未満）＝人員基準欠如
  const understaffed = staff < B.coreStaff;



  // 加算算定可否（体制要件。人数要件は配置基準モデルに一本化＝加算別最低人数は廃止）
  const kasanElig = ka.uplift > 0 && state.ret >= ka.reqRet && !understaffed && !state.coreShortPrev;
  const kasanFailed = ka.uplift > 0 && !kasanElig;
  let uplift = kasanElig ? ka.uplift : 0, haircut = false;
  if (kasanElig && state.comp < 50) { uplift = Math.round(ka.uplift * 0.5); haircut = true; }
  // --- 利用者構成から単価・需要・手間を算出する ---
  const mixInfo = analyzeMix(state.mix);
  const avgLevel = mixInfo.avgLevel;
  const avgLoad = mixInfo.avgLoad;

  // 需要：構成ごとの来所頻度が土台。満足度が低いと足が遠のく
  const satAdj = clamp(0.71 + (state.sat / 100) * 0.50, 0.6, 1.20);
  const occMult = (ev.occMult ?? 1) * occMultI;
  const demand = mixInfo.demand * satAdj * occMult * ik.factor; // 受入方針で受入の間口を絞る/広げる

  // 来所回数＝min(需要, 定員, 受入上限)。職員数は処理能力ではなく配置基準経由で効く。
  const visits = Math.max(0, Math.floor(Math.min(demand, CAP, hijunCap)));
  // タイは 受入上限 > 定員 > 需要 の順（配置はプレイヤーの選択の結果＝行動可能情報を優先）
  const hijunLimited = hijunCap <= Math.min(demand, CAP);
  const capLimited = !hijunLimited && CAP <= Math.min(demand, hijunCap);
  const demandLimited = !hijunLimited && !capLimited;
  const bottleneck = hijunLimited ? "受入上限" : capLimited ? "定員" : "需要";
  const occRate = visits / CAP;

  // 層2: 配置余裕率（実績ベース）。余裕が薄いと満足度に「じわり」効く。
  const uDay = visits / B.operatingDays;
  const nqReal = B.coreStaff + Math.max(1, (uDay - 15) / 5 + 1) * loadAll;
  const M = staff / nqReal;
  const marginT = clamp(Math.round((M - 1.15) * 12), -6, 4);

  // 必要人員（質基準）: 来所実績ベース。判断画面の「見込み」も同じ式（同月のprojectを共有）
  const reqStaff = Math.ceil(nqReal);

  // --- 管理者の工数 ---
  const need = requiredHours({ ...state, staff }, decision, reqStaff);
  const H = B.managerHours;
  const careH = Math.min(need.care, H); // 現場穴埋めは削れない・最優先
  const remaining = Math.max(0, H - careH);
  const needRest = need.admin + need.sales + need.people + need.family;
  const hoursGap = Math.max(0, needRest - remaining); // 足りない時間

  // プレイヤーの配分（0-100の重み）。不足分はこの重みに応じて各業務へ割り当てる
  const w = decision.hours || { admin: 25, sales: 25, people: 25, family: 25 };
  const wSum = (w.admin + w.sales + w.people + w.family) || 1;
  const alloc = {};
  const ratios = {};
  const penalties = {};
  for (const k of ["admin", "sales", "people", "family"]) {
    // 重みに応じて残時間を配る（ただし必要量を超えては配らない）
    const share = remaining * (w[k] / wSum);
    alloc[k] = Math.min(need[k], Math.round(share));
    ratios[k] = need[k] > 0 ? alloc[k] / need[k] : 1;
    penalties[k] = shortfallPenalty(k, ratios[k]);
  }
  // 余った時間を、まだ満たしていない業務に再配分（無駄を出さない）
  let leftover = remaining - Object.values(alloc).reduce((a, b) => a + b, 0);
  for (const k of ["admin", "sales", "people", "family"]) {
    if (leftover <= 0) break;
    const room = need[k] - alloc[k];
    if (room > 0) { const add = Math.min(room, leftover); alloc[k] += add; leftover -= add; }
  }
  for (const k of ["admin", "sales", "people", "family"]) {
    ratios[k] = need[k] > 0 ? alloc[k] / need[k] : 1;
    penalties[k] = shortfallPenalty(k, ratios[k]);
  }
  const hoursPen = {
    compT: penalties.admin.compT || 0,
    usersT: penalties.sales.usersT || 0,
    retT: penalties.people.retT || 0,
    satT: penalties.family.satT || 0,
    billing: penalties.admin.billing, // 請求ミス＝返戻
  };


  // 収入：平均単価は要介護度の構成で決まる
  const basePrice = Math.round(mixInfo.avgPrice) - (state.priceDown || 0);
  // 人員基準欠如減算: コア割れ発生の翌月〜解消の翌月、基本報酬のみ×70%（30%減・加算は対象外）
  const genzan = state.coreShortPrev ? Math.round(visits * basePrice * 0.30) : 0;
  const unitPrice = basePrice + uplift;
  let income = visits * unitPrice - genzan;
  const kasanIncome = visits * uplift;
  // 事務が回らないと請求ミス＝返戻が発生（収入から差し引かれる）
  const billingLoss = hoursPen.billing ? Math.round(income * 0.04) : 0;
  income -= billingLoss;
  // 支出（カードによる事務費高騰・臨時コストを含む）
  // 経費は「収入×経費率」で計算（事務費18%＋事業費7%＝経費率25%を構造的に保つ）
  const fixed = Math.round(income * B.adminExpenseRate) + (ev.fixedUp ?? 0); // 事務費
  const eventCost = ev.cost ?? 0;
  const eventCash = ev.cash ?? 0; // 補助金などの臨時収入
  // 人件費：コア5名(140万)＋非正規(staff−5名)×事業主負担1.15。
  // コア割れ月は欠員職種の実単価を控除（欠員は非正規→介護正規25万×2→看護30万の順）
  const coreDeduct = staff >= 5 ? 0 : staff === 4 ? 250_000 : staff === 3 ? 500_000 : 800_000;
  const staffTotal = Math.round((B.coreWage - coreDeduct + Math.max(0, staff - B.coreStaff) * (B.partWage + (state.staffCostUp || 0))) * B.employerBurden);
  const variable = Math.round(income * B.serviceExpenseRate); // 事業費
  let auditCost = 0, clawback = 0, auditNote = null;
  if (ev.audit) {
    if (state.comp >= 60) { auditCost = 150_000; auditNote = "記録が整っており大過なし。通常対応で完了。"; }
    else if (state.comp >= 40) { auditCost = 300_000; clawback = Math.round(kasanIncome * 0.5); auditNote = "記録に不備あり。加算の一部返還を求められた。"; }
    else { auditCost = 300_000; clawback = kasanIncome; auditNote = "記録が著しく不備。加算の返還と改善指導を受けた。"; }
  }
  const expense = staffTotal + fixed + variable + initCost + auditCost + clawback + eventCost;
  const pl = income + eventCash - expense;

  // 過密ペナルティ（次月の水準に反映）
  const crowd = occRate > 0.85 ? 1 : 0;

  /* ---- 「なぜ数字が動いたか」の理由を集める（研修での気づきの核） ---- */
  const reasons = { sat: [], ret: [], comp: [], users: [], staff: [] };
  const add = (k, v, text) => { if (v) reasons[k].push({ v, text }); };

  // 満足度の要因
  add("sat", c.satT - 60, `ケアの手厚さ「${c.label}」`);
  add("sat", ik.satT, `受入方針「${ik.label}」`);
  add("sat", ka.satT, `加算「${ka.label}」による自立支援`);
  add("sat", satTb, "追加施策（レク・研修）");
  add("sat", (ev.satT ?? 0) + (ev.satShock ?? 0), ev.title ? `出来事「${ev.title}」` : "出来事");
  add("sat", -crowd * 8, "定員ぎりぎりの過密運営で目が行き届かない");
  add("sat", marginT, marginT >= 0 ? "配置に余裕があり、現場が回っている" : "配置に余裕がなく、現場が回らない");
  add("sat", hoursPen.satT, "家族対応・苦情処理に手が回らなかった");

  // 定着度の要因
  add("ret", stRetT, `人員体制「${st.label}」`);
  add("ret", ik.retT, `受入方針「${ik.label}」による現場の負担`);
  add("ret", decision.care === "premium" ? -2 : 0, "手厚いケアによる現場の負担");
  add("ret", retTb, "追加施策（研修など人への投資）");
  add("ret", (ev.retT ?? 0) + (ev.retShock ?? 0), ev.title ? `出来事「${ev.title}」` : "出来事");
  add("ret", -crowd * 5, "過密運営による疲弊");
  add("ret", hoursPen.retT, "職員面談・シフト調整に手が回らなかった");

  // 適正運営度の要因
  add("comp", stCompT, `人員体制「${st.label}」`);
  add("comp", ik.compT, `受入方針「${ik.label}」で記録が後回しに`);
  add("comp", ka.compT, `加算「${ka.label}」の記録・事務負担`);
  add("comp", compTb, "追加施策（記録の整備・研修）");
  add("comp", ev.compT ?? 0, ev.title ? `出来事「${ev.title}」` : "出来事");
  add("comp", understaffed ? -15 : 0, "人員配置基準を満たしておらず運営が崩れている");
  add("comp", hoursPen.compT, "請求・記録の事務に手が回らなかった");

  // 目標水準への収束（＝維持しないと自然に戻る）
  // 層2(配置余裕)とcrowd(過密)のsatチャネル負項は合算下限−12（三重罰防止・§2）
  const satNeg = Math.max(Math.min(marginT, 0) + (-crowd * 8), -12);
  const satTarget = clamp(c.satT + ik.satT + ka.satT + satTb + (ev.satT ?? 0) + (ev.satShock ?? 0) + Math.max(marginT, 0) + satNeg + hoursPen.satT, 0, 100);
  const retTarget = clamp(55 + stRetT + ik.retT + (decision.care === "premium" ? -2 : 0) + retTb
    + (ev.retT ?? 0) + (ev.retShock ?? 0) - crowd * 5 + hoursPen.retT, 0, 100);
  const compTarget = clamp(60 + stCompT + ik.compT + ka.compT + compTb + (ev.compT ?? 0)
    + (understaffed ? -15 : 0) + hoursPen.compT, 0, 100);

  let sat = Math.round(conv(state.sat, satTarget, 0.4));
  let ret = Math.round(conv(state.ret, retTarget, 0.4));
  let comp = Math.round(conv(state.comp, compTarget, 0.35));

  /* 内訳（reasons）を「実際に動いた分」に合わせる。
     メーターは目標へ 40%（compは35%）だけ寄るので、内訳の生の寄与を
     そのまま足すと表示の増減と一致しない（プロが検算すると気づく）。
     そこで、各メーターの内訳を「実際の変化量」に比例配分し直し、
     端数は最大剰余法で調整して、内訳の合計＝表示の増減 を保証する。 */
  const reconcile = (key, before, after) => {
    const list = reasons[key];
    const actualDelta = Math.round(after) - Math.round(before);
    if (!list.length) {
      // 内訳が一つも無いのに数字が動いた＝収束（基準へ戻る力）による微変動
      if (actualDelta !== 0) {
        const drift = actualDelta > 0 ? "特に手を打たず、基準値へ自然に戻った" : "維持する手を打たず、基準値へ下がった";
        reasons[key] = [{ v: actualDelta, text: drift }];
      }
      return;
    }
    const rawSum = list.reduce((a, r) => a + r.v, 0);
    if (rawSum === 0) {
      // 寄与の総和がゼロ。実変化があれば「基準へ自然に戻る力」で説明する
      if (actualDelta === 0) { reasons[key] = []; }
      else {
        const drift = actualDelta > 0 ? "特に手を打たず、基準値へ自然に戻った" : "維持する手を打たず、基準値へ下がった";
        reasons[key] = [{ v: actualDelta, text: drift }];
      }
      return;
    }
    // 実変化を、生の寄与の比率で各項目に配分（小数）
    const scaled = list.map((r) => ({ text: r.text, exact: actualDelta * (r.v / rawSum) }));
    // 整数化：まず切り捨て、端数の大きい順に配って合計を actualDelta に一致させる
    const floors = scaled.map((x) => ({ text: x.text, v: Math.trunc(x.exact), frac: x.exact - Math.trunc(x.exact), sign: Math.sign(x.exact) }));
    let acc = floors.reduce((a, f) => a + f.v, 0);
    let diff = actualDelta - acc; // 残りをどれだけ配るか（正負あり）
    const order = [...floors].sort((a, b) => Math.abs(b.frac) - Math.abs(a.frac));
    let i = 0;
    while (diff !== 0 && i < order.length * 4) {
      const step = diff > 0 ? 1 : -1;
      order[i % order.length].v += step;
      diff -= step;
      i += 1;
    }
    // 0になった項目は表示から落とす（0の理由を並べても意味がない）
    reasons[key] = floors.filter((f) => f.v !== 0).map((f) => ({ v: f.v, text: f.text }));
  };
  reconcile("sat", state.sat, sat);
  reconcile("ret", state.ret, ret);
  reconcile("comp", state.comp, comp);
  // --- 利用者数の増減（構成に反映される） ---
  const usersNow = mixInfo.total;
  const usersTarget = clamp(33 + (sat - 55) * 1.0 + hoursPen.usersT, B.usersMin, B.usersMax);
  // 営業・紹介の効きは前月稼働率で逓減（空きが少ないほど紹介は入らない・v4.7.1）
  const gainMult = clamp((SALES_FULL_OCC - (state.prevOcc ?? 0.65)) / SALES_DECAY_SPAN, SALES_MIN_MULT, 1.0);
  const effSales = salesUsers > 0 ? Math.max(1, Math.round(salesUsers * gainMult)) : 0;
  const evUsersRaw = ev.users ?? 0;
  const effEvUsers = evUsersRaw > 0 ? Math.max(1, Math.round(evUsersRaw * gainMult)) : evUsersRaw;
  let users = Math.round(conv(usersNow, usersTarget, 0.25) + effSales + effEvUsers);
  users = clamp(users, B.usersMin, B.usersMax);
  let curStaff = staff + (ev.dStaff ?? 0);

  add("users", effSales, "営業強化で新規を掘り起こした");
  add("users", effEvUsers, ev.title ? `出来事「${ev.title}」` : "出来事");
  add("users", hoursPen.usersT, "営業・ケアマネ回りに手が回らず紹介が細った");
  if (sat >= 65) add("users", 1, "満足度が高く、口コミで利用者が集まっている");
  else if (sat <= 48) add("users", -1, "満足度が低く、利用者が離れつつある");
  reconcile("users", usersNow, users); // 利用者数の内訳も実変化に合わせる
  add("staff", st.dStaff, `人員体制「${st.label}」`);
  add("staff", ev.dStaff ?? 0, ev.title ? `出来事「${ev.title}」` : "出来事");

  // 受入方針に沿って、利用者構成が少しずつ寄っていく（新規をどの層から取るかが構成を変える）
  // ※ 構成は小数のまま保持する。整数に丸めると小さな変化が消えてしまうため。
  const tgt = INTAKE_TARGET[CONFIG.admission[decision.admission].target];
  const rounded = {};
  for (const L of LEVELS) {
    const cur = (state.mix?.[L.key] || 0) / Math.max(1, usersNow); // 現在の構成比
    const want = tgt[L.key] || 0;
    const ratio = cur + (want - cur) * B.mixShift; // 目標構成へゆっくり寄せる
    rounded[L.key] = Math.max(0, ratio * users);
  }
  // 合計を users にぴったり合わせる（小数のまま）
  const sumMix = LEVELS.reduce((a, L) => a + rounded[L.key], 0);
  if (sumMix > 0) for (const L of LEVELS) rounded[L.key] = rounded[L.key] / sumMix * users;

  const bcp = clamp(state.bcp + bcpBoost - B.bcpDecay, 0, 100);
  sat = clamp(sat, 0, 100); ret = clamp(ret, 0, 100); comp = clamp(comp, 0, 100); users = clamp(users, B.usersMin, B.usersMax);

  let churn = false;
  if (ret < B.retBomb) {
    curStaff -= 1; churn = true;
    add("staff", -1, "定着度が限界を割り、職員が離職した");
  }
  curStaff = clamp(curStaff, B.staffMin, B.staffMax);
  reconcile("staff", state.staff, curStaff); // 職員数の内訳も実変化に合わせる（staffMin/Maxのクランプ込み）

  // 事故リスク
  let risk = 6;
  if (state.ret < 45) risk += 16; else if (state.ret < 55) risk += 7;
  if (M < 1.0) risk += 8; // 配置余裕なし（必要人員を下回る体制）
  if (understaffed) risk += 12;
  if (decision.intake === "high") risk += 6;
  if (state.comp >= 70) risk -= 8;
  if (occRate > 0.85) risk += 8;
  risk = clamp(risk, 2, 75);

  return {
    breakdown: { visits, income, basePrice, unitPrice, uplift, kasanIncome, staffTotal, fixed, variable,
      initCost, auditCost, clawback, eventCost, eventCash, fixedUp: ev.fixedUp ?? 0, expense, pl,
      hijunLimited, understaffed, reqStaff, occRate, kasanFailed, haircut, genzan,
      billingLoss, staffCostUp: ev.staffCostUp ?? 0, priceDown: ev.priceDown ?? 0,
      avgLevel, avgLoad, demand: Math.round(demand), hijunCap, capDay, C, staff, nqReal, marginRate: M, marginT, bottleneck, userCount: usersNow,
      hours: { need, alloc, careH, remaining, hoursGap, ratios, delegable: need.delegable, total: H } },
    preAfter: { users, sat, ret, comp, bcp, staff: curStaff, mix: rounded },
    churn, riskPct: risk, auditNote, event, reasons,
    initiatives: inits.map((k) => CONFIG.initiatives[k].label),
    decisionLabels: { care: c.label, intake: ik.label, staffing: st.label, kasan: ka.label,
      admission: CONFIG.admission[decision.admission].label,
      policy: state.policy ? POLICIES[state.policy].label : "—" },
  };
}

/* --------------------- 1ヶ月を確定（事故抽選＋現金の入出金） --------------------- */
function resolveMonth(state, decision, event) {
  const p = project(state, decision, event);
  const usersBefore = LEVELS.reduce((a, L) => a + (state.mix?.[L.key] || 0), 0);
  const before = { users: Math.round(usersBefore), sat: Math.round(state.sat), ret: Math.round(state.ret),
    comp: Math.round(state.comp), bcp: Math.round(state.bcp), staff: state.staff, funds: state.funds };
  const bd = { ...p.breakdown };
  let { users, sat, ret, comp, bcp, staff, mix } = p.preAfter;

  // 事故抽選
  let accident = false;
  if (Math.random() * 100 < p.riskPct) {
    accident = true;
    const acc = CONFIG.base.accident;
    const satB = sat, compB = comp;
    sat = clamp(sat - acc.dSat, 0, 100);
    const before2 = users;
    users = clamp(users - acc.dUsers, CONFIG.base.usersMin, CONFIG.base.usersMax);
    // 減った分を構成からも比例して差し引く
    if (before2 > 0 && users < before2) {
      const r = users / before2;
      let acc2 = 0;
      LEVELS.forEach((L, i) => {
        if (i === LEVELS.length - 1) mix[L.key] = Math.max(0, users - acc2);
        else { mix[L.key] = Math.max(0, Math.round((mix[L.key] || 0) * r)); acc2 += mix[L.key]; }
      });
    }
    comp = clamp(comp - acc.dComp, 0, 100);
    bd.expense += acc.cost; bd.pl -= acc.cost; bd.accidentCost = acc.cost;
    p._accidentDelta = { sat: sat - satB, users: users - before2, comp: comp - compB };
  }

  // 現金：介護報酬は約2ヶ月遅れで入金
  const pipe = state.pipeline;
  const cashIn = pipe[0] + (bd.eventCash || 0);
  const newPipe = [pipe[1], bd.income];
  const cashOut = bd.expense;
  const cashAfter = state.funds + cashIn - cashOut;
  const receivables = pipe[1] + bd.income;
  bd.cashIn = cashIn; bd.cashOut = cashOut; bd.cashAfter = cashAfter; bd.receivables = receivables;

  const after = { users, sat, ret, comp, bcp, staff, mix, funds: cashAfter };
  if (accident && p._accidentDelta) {
    const ad = p._accidentDelta;
    if (ad.sat) p.reasons.sat.push({ v: ad.sat, text: "転倒事故が起き、信頼が損なわれた" });
    if (ad.users) p.reasons.users.push({ v: ad.users, text: "事故を受けて利用を控える家族が出た" });
    if (ad.comp) p.reasons.comp.push({ v: ad.comp, text: "事故対応に追われ、記録・事務が乱れた" });
  }
  return {
    breakdown: bd, before, after, churn: p.churn, accident, riskPct: p.riskPct, auditNote: p.auditNote,
    event, initiatives: p.initiatives, decisionLabels: p.decisionLabels, reasons: p.reasons,
    newState: { ...state, month: state.month + 1, ...after, pipeline: newPipe,
      coreShortPrev: after.staff < CONFIG.base.coreStaff, // コア割れ翌月に減算を適用（D-3）
      prevOcc: bd.occRate,                                 // 営業逓減の基準（v4.7.1）
      marginRate: bd.marginRate,                          // 離職確率の連動に使う（D-2）
      staffCostUp: (state.staffCostUp || 0) + (bd.staffCostUp || 0),   // 最低賃金は以後ずっと効く
      priceDown: (state.priceDown || 0) + (bd.priceDown || 0) },        // 報酬改定も以後ずっと効く
  };
}

/* =========================================================================
   課題の仕分け（このツールの核心）
   ---------------------------------------------------------------------------
   12ヶ月のプレイ履歴と最終状態から、自事業所の課題候補を洗い出し、
   「自分で改善できること」と「第三者の伴走が要ること」に仕分ける。

   設計原則：
   ・自走できる部分は先に手放す。具体的なアクションまで書き切る。
   ・押し売りにしない。だからこそ「伴走が要る」に説得力が出る。
   ・伴走領域は SWMD のサービス領域（人材育成／加算算定／BCP）に対応する。
========================================================================= */
function diagnoseIssues(log, finalState) {
  const self = [];   // 自分で改善できること
  const support = []; // 第三者の伴走を検討したほうがよいこと
  if (!log.length) return { self, support };

  const n = log.length;
  const last = log[n - 1];
  const f = finalState;

  // ---- 集計 ----
  const avgOcc = log.reduce((a, r) => a + r.breakdown.occRate, 0) / n;
  const avgMargin = log.reduce((a, r) => a + (r.breakdown.marginRate ?? 1.3), 0) / n;
  const bnCount = { 受入上限: 0, 定員: 0, 需要: 0 };
  log.forEach((r) => { bnCount[r.breakdown.bottleneck] = (bnCount[r.breakdown.bottleneck] || 0) + 1; });
  const mainBn = Object.entries(bnCount).sort((a, b) => b[1] - a[1])[0][0];

  const churnCount = log.filter((r) => r.churn).length;
  const kasanFailMonths = log.filter((r) => r.breakdown.kasanFailed).length;
  const kasanTried = log.filter((r) => r.decisionLabels.kasan !== "取り組まない").length;
  const clawbackMonths = log.filter((r) => r.breakdown.clawback > 0).length;
  const billingMonths = log.filter((r) => r.breakdown.billingLoss > 0).length;
  const accidentCount = log.filter((r) => r.accident).length;
  const disasterHits = log.filter((r) => r.event?.type === "disaster");
  const disasterLoss = disasterHits.reduce((a, r) => a + (r.breakdown.eventCost || 0), 0);
  const understaffMonths = log.filter((r) => r.breakdown.understaffed).length;
  const cashShortMonths = log.filter((r) => r.breakdown.cashAfter < 0).length;
  const totalPl = log.reduce((a, r) => a + r.breakdown.pl, 0);
  // 記録・事務の弱点を自走側（請求ミス／記録整備）が既に挙げているか。
  // 伴走側で同じ弱点を二重に指摘しない（＝食い違いを起こさない）ための判定。
  const selfFlaggedRecords = billingMonths > 0 || f.comp < 50;

  /* ================= 自分で改善できること ================= */

  // 稼働率・ボトルネック
  if (mainBn === "需要" && avgOcc < 0.70) {
    self.push({
      title: "稼働率が上がっていない（利用者が足りない）",
      fact: `12ヶ月の平均稼働率は${Math.round(avgOcc * 100)}%。職員には余力があるのに、来所の需要が足りていません。`,
      action: "職員を増やしても収入は増えません。まず「頭数を集める（営業・ケアマネ回り）」のか、「単価を上げる（重度受入。ただし手間と配置の負荷も増える）」のか、方針を決めてください。自事業所のボトルネックがどちらかを見極めることが先決です。",
    });
  }
  if (mainBn === "受入上限" && avgOcc < 0.75) {
    self.push({
      title: "配置が受入の天井になっていた",
      fact: `${bnCount["受入上限"]}ヶ月にわたり、今の職員数・ケア体制で受けられる上限に当たっていました。`,
      action: "需要はあるのに機会損失が出ています。増員か、ケア体制の見直しで受入の枠は広がります。自事業所でも「体制を理由に断っている利用者」がいないか、確認してみてください。",
    });
  }
  if (mainBn === "定員") {
    self.push({
      title: "定員がいっぱいで、これ以上受けられない",
      fact: "定員が上限となり、頭数ではもう伸ばせない状態でした。",
      action: "この局面では「単価を上げる」しか道がありません。重度の方の受け入れや加算の算定を検討することになります（体制の負荷が増えるため、配置の余裕とセットで）。",
    });
  }

  // 記録・事務
  if (billingMonths > 0) {
    self.push({
      title: "事務が回らず、請求ミスが起きた",
      fact: `${billingMonths}ヶ月で請求ミスによる返戻が発生しました。`,
      action: "記録・請求は「後回しにできる仕事」に見えて、実は収入に直結します。誰がいつ書くのかを業務に組み込めているか、確認してください。",
    });
  } else if (f.comp < 50) {
    self.push({
      title: "記録・書類の整備が追いついていない",
      fact: `適正運営度が${Math.round(f.comp)}まで低下しました。`,
      action: "実地指導が入れば指摘は避けられない水準です。記録の運用ルールを整えるところから着手できます。",
    });
  }

  // 人員配置基準
  if (understaffMonths > 0) {
    self.push({
      title: "人員基準欠如（コア職員割れ）が起きた",
      fact: `${understaffMonths}ヶ月にわたりコア職員（5名）を割り、翌月の基本報酬が減算されました。`,
      action: "人員基準の欠如は基本報酬の減算に直結し、運営そのものが問われます。離職が出ても翌月に立て直せる採用・定着の備えを持ってください。",
    });
  }

  // 配置の余裕
  if (avgMargin < 1.05) {
    self.push({
      title: "配置の余裕がない経営が続いた",
      fact: `12ヶ月平均の配置余裕は${Math.round(avgMargin * 100)}%。必要人員ぎりぎりの体制が常態化していました。`,
      action: "基準を満たしていても、余裕のない配置は満足度と定着をじわじわ削り、離職リスクも高めます。体制の負荷（ケア・受入層・加算）と人員のバランスを見直してください。",
    });
  }

  // 資金繰り
  if (cashShortMonths > 0) {
    self.push({
      title: "手元の現金が尽きた月があった",
      fact: `${cashShortMonths}ヶ月で現金がマイナスになりました。${totalPl >= 0 ? "通期では黒字だったにもかかわらず、です。" : ""}`,
      action: "介護報酬は約2ヶ月遅れで入金されます。「黒字なのに現金が無い」は珍しくありません。数ヶ月先の入出金を見通せているか、確認してください。",
    });
  }

  /* ============ 第三者の伴走を検討したほうがよいこと ============ */

  // 人材育成・定着
  if (churnCount >= 2 || f.ret < 48) {
    const detail = churnCount > 0
      ? `12ヶ月で${churnCount}名が離職しました。`
      : `定着度が${Math.round(f.ret)}まで低下しました。人が抜け始める水準です。`;
    support.push({
      area: "人材育成・定着",
      title: "職員が続かない",
      fact: detail + "職員が抜けると現場が薄くなり、管理者が穴埋めに入り、記録や営業が止まる——この連鎖が起きます。",
      why: "採用で埋め続けるのは限界があります。なぜ人が辞めるのか、どうすれば続くのか。当事者だけで原因を特定するのは難しく、外部の視点が要る領域です。",
    });
  }

  // 加算算定
  if (kasanTried > 0 && kasanFailMonths >= 4) {
    support.push({
      area: "加算算定の体制構築",
      title: "加算を取ろうとしたが、要件を満たせなかった",
      fact: `${kasanFailMonths}ヶ月にわたり、体制要件（職員数・定着度）を満たせず加算を算定できませんでした。`,
      why: "加算は「取ると決める」だけでは取れません。人員・記録・体制が揃って初めて算定できます。どの加算なら自事業所で取れるのか、何を整えれば届くのか。この設計は専門的な検討が要ります。",
    });
  } else if (kasanTried === 0) {
    support.push({
      area: "加算算定の体制構築",
      title: "加算にまったく取り組まなかった",
      fact: "12ヶ月を通じて、加算の算定に取り組みませんでした。",
      why: "加算は単価を押し上げる、最も確実な収益改善策です。良いケアを収益として回収する仕組みでもあります。取れるはずの加算を取りこぼしていないか、一度棚卸しする価値があります。",
    });
  } else if (clawbackMonths > 0 && f.comp < 55 && !selfFlaggedRecords) {
    // 単発の返還は運の要素もある。記録の水準自体が低い場合に限って課題とし、
    // かつ自走側で既に記録・事務を指摘しているときは二重に言わない（棲み分け：自走＝記録運用／伴走＝加算体制）
    support.push({
      area: "加算算定の体制構築",
      title: "実地指導で加算の返還を求められた",
      fact: `記録の不備により、算定済みの加算を返還することになりました。適正運営度も${Math.round(f.comp)}にとどまっています。`,
      why: "加算は「取る」だけでなく「維持する」ことが難しい。記録が要件を満たしているか、第三者の目で点検する仕組みが要ります。",
    });
  }

  // BCP：被災するかどうかは運。被害の有無ではなく「備えの水準（BCP対策度）」だけで判定する。
  // → 同じ戦略なら、災害を引いても引かなくても伴走提案の有無は変わらない。
  //   被災した場合は事実として費用に触れるが、それは提案を出す/出さないの判定には使わない。
  if (f.bcp < 22) {
    const hit = disasterHits.length > 0;
    support.push({
      area: "BCP策定・訓練",
      title: hit ? "災害に備えがないまま被災した" : "災害への備えがほとんどない",
      fact: hit
        ? `BCP対策度が${Math.round(f.bcp)}のまま、${disasterHits.length}回の災害に見舞われ、対応費用として約${yen(disasterLoss)}を要しました。被災するかどうかは運ですが、被害の大きさは平時の備えで変わります。`
        : `BCP対策度が${Math.round(f.bcp)}のまま12ヶ月が過ぎました。今回はたまたま大きな災害が来ませんでしたが、次も来ないとは限りません。`,
      why: "BCPは「作って終わり」の書類ではありません。感染症も地震も水害も、起きてから考えるのでは間に合わない。備えは平時にしかできず、何をどこまで備えるかの優先順位づけには外部の視点が有効です。",
    });
  }

  // 事故：偶発性があるため、体制の問題（定着が低い or 人員不足）を伴う場合のみ課題とする。
  // 体制が整っているのに事故が出た回は「運」であり、それを課題として売り込まない。
  if (accidentCount >= 3 && (f.ret < 55 || understaffMonths > 0)) {
    support.push({
      area: "人材育成・定着",
      title: "事故が繰り返し起きた",
      fact: `12ヶ月で${accidentCount}件の事故が発生しました。個々の事故には偶然の要素もありますが、この頻度の背景には手薄・疲弊した現場があります。`,
      why: "事故は「不注意」ではなく、余裕のない現場から生まれます。人員体制と職員の余裕を立て直さない限り、繰り返します。",
    });
  }

  // 重要度の高いものに絞る。全部並べると「売り込み」に見え、かえって信用を失う。
  // 自分で改善：最大3件 ／ 伴走：最大2件
  const selfTop = self.slice(0, 3);
  const supportTop = support.slice(0, 2);
  const omitted = (self.length - selfTop.length) + (support.length - supportTop.length);

  return {
    self: selfTop, support: supportTop, omitted,
    stats: { avgOcc, mainBn, churnCount, kasanFailMonths, totalPl },
  };
}

/* 状態から相談員のひとことを選ぶ。読むだけ・戻り値は {tone, text}。
   序盤(1-3月)は固定ガイド。深刻な懸念(cash/ret<45/comp<45)は率直に諫言。
   懸念が無い健全ゾーンでは「次に伸ばせる余地」を候補から集め、month で巡回させて
   同じ文言が続かないようにする（褒め一択の回避）。全方位盤石なら純粋な承認。
   健全ゾーンのしきい値：occ<0.72 / 加算<active / bcp<55 / ret<62 / sat<68。 */
function advisorComment(month, s, bd, mix) {
  if (month <= 3) return { tone: "guide", text: ADVISOR_LINES.guide[month] };

  // ① 深刻な懸念は率直に諫言（承認・助言より優先）。現金は2ヶ月遅れ入金を先読み。
  const cashEnd  = s.funds + (s.pipeline?.[0] || 0) - bd.expense;
  const cashEnd2 = cashEnd + (s.pipeline?.[1] || 0) - bd.expense;
  if (Math.min(cashEnd, cashEnd2) < 500000) return { tone: "alert", text: ADVISOR_LINES.cash };
  // 人員基準欠如・減算中は現金に次ぐ緊急事態
  if (bd.understaffed || s.coreShortPrev) return { tone: "alert", text: ADVISOR_LINES.genzanAlert };
  if (s.ret < 45)  return { tone: "alert", text: ADVISOR_LINES.ret };
  if (s.comp < 45) return { tone: "alert", text: ADVISOR_LINES.comp };
  // 配置の状態コメント（受入上限に当たっている／余裕が薄い＝監修3・閾値110%）
  if (bd.bottleneck === "受入上限") return { tone: "soft", text: ADVISOR_LINES.capAlert };
  if (bd.marginRate < 1.10)         return { tone: "soft", text: ADVISOR_LINES.thinMargin };

  // ② 健全ゾーン：利用枠いっぱいは最優先で「質の勝負」を伝える（good寄り・監修2）
  if (bd.bottleneck === "定員") return { tone: "good", text: ADVISOR_LINES.fullHouse };
  const growth = [];
  if (bd.occRate < 0.72 && bd.hijunCap > bd.visits + 22) growth.push(ADVISOR_LINES.growthOcc);
  if ((bd.uplift || 0) < CONFIG.kasan.active.uplift) growth.push(ADVISOR_LINES.growthKasan);
  if (s.bcp < 55)                                    growth.push(ADVISOR_LINES.growthBcp);
  if (s.ret < 62)                                    growth.push(ADVISOR_LINES.growthRet);
  if (s.sat < 68)                                    growth.push(ADVISOR_LINES.growthSat);
  if (growth.length) return { tone: "good", text: growth[month % growth.length] };

  // ③ どれにも該当しない全方位盤石 → 純粋な承認（終盤は通期の振り返りへ）。
  return { tone: "good", text: month >= App.totalMonths ? ADVISOR_LINES.final : ADVISOR_LINES.good };
}

function startGame(mode) {
  const B = CONFIG.base;
  App.mode = mode;
  const months = 12; // 両コースとも12ターン。差は判断項目の多さで付ける
  App.totalMonths = months;
  const s0 = {
    month: 1, funds: B.initFunds, mix: { ...B.initMix }, sat: B.initSat, staff: B.initStaff,
    users: LEVELS.reduce((a, L) => a + (B.initMix[L.key] || 0), 0),
    ret: B.initRet, comp: B.initComp, bcp: B.initBcp,
    pipeline: [B.receivableSeed, B.receivableSeed],
    staffCostUp: 0, priceDown: 0, policy: null, coreShortPrev: false, marginRate: 1.3, prevOcc: 0.65,
  };
  s0.card = drawCard(s0, 1, months);
  App.state = s0;
  App.decision = freshDecision();
  App.log = [];
  App.lastResult = null;
  App.phase = "decide";
  render();
}

function applyPolicy(key) {
  const p = POLICIES[key];
  if (!p) return;
  App.state.policy = key;
  const hours = isExec() ? { ...p.set.hours } : { ...AUTO_HOURS };
  App.decision = { ...App.decision, ...p.set, hours };
  render();
}

function setLever(group, value) { App.decision[group] = value; render(); }
function setHours(key, value) { App.decision.hours[key] = Number(value); render(); }
function setChoice(i) { App.decision.choiceIdx = i; render(); }
function toggleInit(k) {
  const list = App.decision.initiatives;
  App.decision.initiatives = list.includes(k) ? list.filter((x) => x !== k) : [...list, k];
  render();
}

function currentEvent() {
  const raw = App.state?.card;
  if (!raw) return null;
  if (raw.type !== "choice") return raw;
  // 選択肢数はカードごとに違うため、範囲外にならないよう丸める
  const i = clamp(App.decision.choiceIdx ?? 0, 0, raw.choices.length - 1);
  const pick = raw.choices[i];
  return { ...raw, ...pick, chosenLabel: pick.label };
}

function runMonth() {
  const r = resolveMonth(App.state, App.decision, currentEvent());
  App.lastResult = r;
  App.log.push(r);
  App.phase = "result";
  window.scrollTo(0, 0);
  render();
}

function nextMonth() {
  const ns = App.lastResult.newState;
  if (ns.month > App.totalMonths) { App.phase = "end"; window.scrollTo(0, 0); render(); return; }
  ns.card = drawCard(ns, ns.month, App.totalMonths);
  App.state = ns;
  App.decision = freshDecision();
  if (ns.policy) {
    const p = POLICIES[ns.policy];
    const hours = isExec() ? { ...p.set.hours } : { ...AUTO_HOURS };
    App.decision = { ...App.decision, ...p.set, hours };
  }
  App.phase = "decide";
  window.scrollTo(0, 0);
  render();
}

function restart() { App.phase = "start"; window.scrollTo(0, 0); render(); }

/* ------------------------------ 画面の描画 ------------------------------ */
function render() {
  const el = root();
  if (App.phase === "start") el.innerHTML = viewStart();
  else if (App.phase === "decide") el.innerHTML = viewDecide();
  else if (App.phase === "result") el.innerHTML = viewResult();
  else if (App.phase === "end") el.innerHTML = viewEnd();
  else if (App.phase === "report") el.innerHTML = viewReport();
  bind();
}

function bind() {
  document.querySelectorAll("[data-act]").forEach((n) => {
    n.onclick = () => {
      const a = n.dataset.act, v = n.dataset.val;
      if (a === "start") startGame(v);
      else if (a === "policy") applyPolicy(v);
      else if (a === "lever") setLever(n.dataset.group, v);
      else if (a === "init") toggleInit(v);
      else if (a === "choice") setChoice(Number(v));
      else if (a === "run") runMonth();
      else if (a === "next") nextMonth();
      else if (a === "restart") restart();
      else if (a === "report") { App.phase = "report"; window.scrollTo(0, 0); render(); }
    };
  });
  document.querySelectorAll("[data-hours]").forEach((n) => {
    n.oninput = () => setHours(n.dataset.hours, n.value);
  });
}

/* ------------------------------- 結果画面 ------------------------------- */
const row = (k, v) => `<div class="row"><span>${k}</span><span class="row-v">${v}</span></div>`;

function deltaRow(label, before, after, suffix = "") {
  const b = Math.round(before), a = Math.round(after), dv = a - b;
  const chip = dv === 0 ? `<span class="delta flat">±0</span>`
    : `<span class="delta ${dv > 0 ? "up" : "down"}">${dv > 0 ? "▲" : "▼"}${Math.abs(dv)}${suffix}</span>`;
  return `<div class="drow"><span class="drow-label">${label}</span>
    <span class="drow-nums">${b}${suffix} → <b>${a}${suffix}</b></span>${chip}</div>`;
}

// メーターの増減と「なぜそうなったか」を並べて説明する
function whyBlock(label, key, r, meaning, suffix = "") {
  const before = Math.round(r.before[key]), after = Math.round(r.after[key]);
  const dv = after - before;
  const list = (r.reasons?.[key] || []).filter((x) => x.v);
  // 意図的な要因の合計と、実際の変化のズレ＝「元の水準へ自然に戻る力」
  const pushed = list.reduce((a, x) => a + x.v, 0);
  const cls = dv > 0 ? "up" : dv < 0 ? "down" : "flat";
  const arrow = dv === 0 ? "±0" : `${dv > 0 ? "▲" : "▼"}${Math.abs(dv)}${suffix}`;

  return `<div class="why ${cls}">
    <div class="why-head">
      <span class="why-label">${label}<small>${meaning}</small></span>
      <span class="why-nums">${before}${suffix} → <b>${after}${suffix}</b> <span class="delta ${cls}">${arrow}</span></span>
    </div>
    ${list.length ? `<div class="why-list">${list
      .sort((a, b) => Math.abs(b.v) - Math.abs(a.v))
      .map((x) => `<div class="why-item ${x.v > 0 ? "pos" : "neg"}">
        <span class="why-v">${x.v > 0 ? "+" : ""}${x.v}</span>
        <span class="why-t">${esc(x.text)}</span></div>`).join("")}</div>`
      : `<div class="why-none">今月の判断では、この数字を動かす手を打っていません。</div>`}
    ${(key === "sat" || key === "ret" || key === "comp") && Math.abs(pushed) < 2 && dv !== 0
      ? `<div class="why-drift">※ 手を打たなければ、数字は元の水準へゆっくり戻ります。維持するには働きかけ続ける必要があります。</div>` : ""}
  </div>`;
}

/* 「来所回数の決まり方」ブロック（結果画面）。
   来所回数 = min(需要, 定員, 受入上限[配置]) という経営構造そのものを見せる。
   3値・visits・稼働率はすべて既存の計算結果(breakdown)をそのまま参照し、再計算しない。
   強調（▼）はエンジン内部の判定(bd.bottleneck)に統一する。表示側で独自の
   優先順位を持たない（ソースオブトゥルースはエンジン一本）。 */
function bottleneckBlock(bd) {
  // カードは「定員／需要」の2枚（受入上限カードはv4.7.1で撤去。エンジンのminは安全装置として維持）
  const cards = [
    { key: "cap",    label: "定員", v: CAP },
    { key: "demand", label: "需要", v: bd.demand },
  ];
  const isHijun = bd.bottleneck === "受入上限";
  const bnKey = bd.bottleneck === "定員" ? "cap" : "demand";
  // 受入上限が縛った月は▼をカードに付けず、警告文で示す（受けられなかった回数付き）
  const lost = isHijun ? Math.max(0, Math.floor(Math.min(bd.demand, CAP)) - bd.visits) : 0;
  const note = isHijun
    ? `今の職員数で基準を守れる受入を超える希望がありました（${lost}回分）。増員で受入を広げられます。`
    : bnKey === "demand"
      ? (bd.occRate >= OCC_NEAR_FULL
        ? "ほぼ利用枠いっぱいです。稼働率100%に近い状況です。ここから先は受け入れの質と体制の維持が焦点です。"
        : "ボトルネック: 需要。利用希望が伸び悩んでいます。営業・ケアマネ連携が打ち手です。")
      : "利用枠がいっぱいです。定員が受け入れの天井です。";
  return `<div class="bnk">
    <div class="bnk-cap">来所回数の決まり方　<small>需要と定員の一番小さいところで止まる</small></div>
    <div class="bnk-cards">
      ${cards.map((c) => `<div class="bnk-card${!isHijun && c.key === bnKey ? " min" : ""}">
        <span class="bnk-l">${!isHijun && c.key === bnKey ? "▼ " : ""}${c.label}</span>
        <span class="bnk-v">${c.v}回</span>
      </div>`).join("")}
    </div>
    <div class="bnk-occ">稼働率 <b>${Math.round(bd.occRate * 100)}%</b>＝延べ ${bd.visits}回 ÷ 定員 ${CAP}回
      <span class="margin-badge ${bd.understaffed ? "margin-bad" : bd.marginRate < 1.05 ? "margin-warn" : "margin-ok"}">
        ${bd.understaffed ? "⚠人員基準欠如" : `配置余裕 ${Math.round(bd.marginRate * 100)}%`}（必要${bd.nqReal.toFixed(1)}名/現在${bd.staff}名）
      </span></div>
    <div class="bnk-note bn-${isHijun ? "staff" : bnKey}">${note}</div>
  </div>`;
}

    <div class="hreport">
      <div class="hreport-title">管理者の時間はどう使われたか</div>
      <div class="hr-care">現場に <b>${bd.hours.careH}h</b>（うち穴埋め ${Math.max(0, bd.hours.careH - CONFIG.base.managerBaseCare)}h）。ここは削れません。</div>
      <div class="hr-rows">${["admin", "sales", "people", "family"].map((k) => {
        const need = bd.hours.need[k], got = bd.hours.alloc[k];
        const ratio = need > 0 ? got / need : 1;
        const lvl = ratio >= 0.98 ? "full" : ratio >= 0.65 ? "part" : "short";
        const badge = ratio >= 0.98 ? "できた" : ratio >= 0.65 ? "一部" : "手が回らず";
        return `<div class="hr-row ${lvl}"><span class="hr-label">${TASKS[k].label}</span>
          <span class="hr-num">${got}/${need}h</span><span class="hr-badge">${badge}</span></div>`;
      }).join("")}</div>
      ${bd.billingLoss > 0 ? `<div class="hr-alert">事務が回らず請求ミスが発生。${yen(bd.billingLoss)} が返戻されました。</div>` : ""}
    </div>

    ${r.initiatives.length ? `<div class="applied"><span class="applied-label">実施した施策</span>
      ${r.initiatives.map((n) => `<span class="applied-chip">${esc(n)}</span>`).join("")}</div>` : ""}
    ${r.event?.chosenLabel ? `<div class="chosennote">選んだ対応：<b>${esc(r.event.chosenLabel)}</b></div>` : ""}
    ${r.auditNote ? `<div class="auditnote">🔎 実地指導：${esc(r.auditNote)}</div>` : ""}
    ${r.accident ? `<div class="accident">💥 転倒事故が発生しました。手薄・疲弊した現場ではリスクが現実になります。満足度と信頼が大きく低下。</div>` : ""}

    <div class="delta-panel">
      <div class="delta-panel-title">サービス提供の結果、来月に向けて<small>なぜ動いたのか、理由を確かめてください</small></div>
      ${whyBlock("満足度", "sat", r, "利用者がこのデイをどう感じているか")}
      ${whyBlock("定着度", "ret", r, "職員がここで働き続けたいと思えているか")}
      ${whyBlock("適正運営度", "comp", r, "記録・書類が整い、基準を守れているか")}
      ${whyBlock("利用者数", "users", r, "登録している利用者の人数", "名")}
      ${whyBlock("職員数", "staff", r, "常勤換算の職員数", "名")}
      ${deltaRow("BCP対策度", r.before.bcp, r.after.bcp)}
      ${r.churn ? `<div class="churn">💥 定着度の低下で職員が1名離職しました。負担がさらに残る職員に集中します。</div>` : ""}
    </div>

    <button class="cta" data-act="next">${r.newState.month > App.totalMonths ? "通期の決算を見る →" : `第${r.newState.month}月へ進む →`}</button>
  </div>`;
}

/* ------------------------------- 終了画面 ------------------------------- */
function viewEnd() {
  const totalPl = App.log.reduce((a, r) => a + r.breakdown.pl, 0);
  const last = App.log[App.log.length - 1];
  const finalCash = last.newState.funds;
  const everNeg = App.log.some((r) => r.breakdown.cashAfter < 0);
  const final = last.after;

  // 期間の長さでスケールを変える（6ヶ月と12ヶ月で同じ閾値は不公平）
  const k = App.totalMonths / 12;
  let tier, cls;
  if (everNeg) { tier = "資金ショート"; cls = "t-bad"; }
  else if (totalPl > 3000000 * k) { tier = "優良経営"; cls = "t-great"; }
  else if (totalPl >= 0) { tier = "黒字達成"; cls = "t-good"; }
  else if (totalPl > -3000000 * k) { tier = "赤字・要改善"; cls = "t-warn"; }
  else { tier = "経営危機"; cls = "t-bad"; }

  // 黒字でも組織が壊れていれば、その事実を突きつける
  const issues = diagnoseHealth(final);
  const rotting = totalPl >= 0 && issues.some((i) => i.level === "bad");

  return `<div class="frame"><div class="end">
    <div class="eyebrow">${App.mode === "exec" ? "詳細コース｜経営の課題分析" : "標準コース｜経営の基本"}　${App.totalMonths}ヶ月の通期決算</div>
    <div class="end-tier ${cls}">${tier}</div>
    <div class="end-figures">
      <div class="end-fig"><div class="end-fig-label">通期損益（発生ベース）</div>
        <div class="end-fig-val ${totalPl >= 0 ? "profit" : "loss"}">${signYen(totalPl)}</div></div>
      <div class="end-fig"><div class="end-fig-label">期末の手元現金</div>
        <div class="end-fig-val${finalCash < 0 ? " loss" : ""}">${yen(finalCash)}</div></div>
    </div>
    ${everNeg ? `<div class="end-cashwarn">期中に手元現金がマイナスになった月がありました。黒字でも資金繰りが破綻すれば事業は続きません。</div>` : ""}

    <div class="health">
      <div class="health-title">${App.totalMonths}ヶ月を終えた、組織の状態</div>
      <div class="health-meters">
        ${[["満足度", final.sat], ["定着度", final.ret], ["適正運営度", final.comp], ["BCP対策度", final.bcp]].map(([n, v]) => {
          const lv = v >= 60 ? "ok" : v >= 45 ? "mid" : "ng";
          return `<div class="hm ${lv}"><span class="hm-n">${n}</span><span class="hm-v">${Math.round(v)}</span></div>`;
        }).join("")}
        <div class="hm ${final.staff >= 6 ? "ok" : final.staff >= 4 ? "mid" : "ng"}">
          <span class="hm-n">職員数</span><span class="hm-v">${final.staff}名</span></div>
      </div>
      ${rotting ? `<div class="rot">数字の上では黒字です。しかし組織は壊れています。この状態のまま続ければ、
        黒字はそう長く続きません。<b>サービスを提供して収益を上げることと、事業を続けられる状態を保つことは、別のことです。</b></div>` : ""}
      ${issues.length ? `<div class="health-issues">
        <div class="hi-head">この先に待っていること</div>
        ${issues.map((i) => `<div class="hi ${i.level}">${i.level === "bad" ? "●" : "○"} ${esc(i.text)}</div>`).join("")}
      </div>` : `<div class="health-good">✔ 大きな問題は見当たりません。利用者にも職員にも向き合えた${App.totalMonths}ヶ月でした。</div>`}
    </div>

    <div class="journey">
      <div class="journey-title">判断のふりかえり</div>
      <div class="jscroll"><table class="journey-table">
        <thead><tr><th>月</th><th>方針</th><th>出来事</th><th>受入</th><th>受入層</th><th>ケア</th><th>人員</th><th>加算</th><th>稼働</th><th>損益</th><th>現金</th></tr></thead>
        <tbody>${App.log.map((r, i) => `<tr>
          <td>${i + 1}</td>
          <td class="j-pol">${esc(r.decisionLabels.policy)}</td>
          <td class="j-ev j-${r.event?.type || "none"}">${r.event ? esc(r.event.title) : "—"}</td>
          <td>${r.decisionLabels.intake}</td>
          <td class="j-adm">${r.decisionLabels.admission}</td>
          <td>${r.decisionLabels.care}</td>
          <td>${r.decisionLabels.staffing}</td>
          <td class="j-kasan">${r.decisionLabels.kasan === "取り組まない" ? "—" : r.decisionLabels.kasan}</td>
          <td>${Math.round(r.breakdown.occRate * 100)}%</td>
          <td class="${r.breakdown.pl >= 0 ? "profit" : "loss"}">${signYen(r.breakdown.pl)}</td>
          <td class="${r.breakdown.cashAfter < 0 ? "loss" : ""}">${yen(r.breakdown.cashAfter)}</td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>
    <button class="cta" data-act="report">この結果から、自事業所の課題を整理する →</button>
    <button class="cta ghost" data-act="restart">別の方針でもう一度プレイする</button>
  </div></div>`;
}

/* ------------------------- 課題レポート（このツールの出口） ------------------------- */
function viewReport() {
  const last = App.log[App.log.length - 1];
  const final = last.after;
  const { self, support, omitted } = diagnoseIssues(App.log, final);
  const totalPl = App.log.reduce((a, r) => a + r.breakdown.pl, 0);

  return `<div class="frame"><div class="report">
    <div class="eyebrow">経営課題の整理</div>
    <h1 class="rep-title">この12ヶ月から見えた、<br><span class="title-accent">あなたの事業所の課題</span></h1>
    <p class="rep-lead">
      シミュレーションはあくまで架空のモデルであり、災害や事故には運の要素も含まれます。
      それでも、ここで起きたことの多くは、実際のデイサービスでも起きています。
      <b>「自分の事業所だったらどうか」という目で読んでみてください。</b>
    </p>

    ${self.length ? `<div class="rep-sec self">
      <div class="rs-head">
        <span class="rs-tag">ご自身で改善できること</span>
        <span class="rs-note">外部の力を借りなくても、明日から着手できる領域です</span>
      </div>
      ${self.map((i) => `<div class="issue">
        <div class="issue-title">${esc(i.title)}</div>
        <div class="issue-fact">${esc(i.fact)}</div>
        <div class="issue-action"><b>どうするか</b>${esc(i.action)}</div>
      </div>`).join("")}
    </div>` : ""}

    ${support.length ? `<div class="rep-sec support">
      <div class="rs-head">
        <span class="rs-tag">第三者の伴走を検討したほうがよいこと</span>
        <span class="rs-note">当事者だけで原因を特定し、解決するのが難しい領域です</span>
      </div>
      ${support.map((i) => `<div class="issue sup">
        <div class="issue-area">${esc(i.area)}</div>
        <div class="issue-title">${esc(i.title)}</div>
        <div class="issue-fact">${esc(i.fact)}</div>
        <div class="issue-why">${esc(i.why)}</div>
      </div>`).join("")}
    </div>`
    : self.length ? `<div class="rep-clean">
      外部の伴走が必要な段階ではありません。上に挙げた点は、いずれもご自身で着手できる範囲です。<br>
      ここを整えられれば、経営はさらに安定します。条件を変えれば結果も変わります。別の方針でも試してみてください。
    </div>`
    : `<div class="rep-clean">
      大きな課題は見当たりませんでした。利用者にも職員にも向き合えた12ヶ月です。<br>
      ただし、条件を変えれば結果は変わります。別の経営方針でも試してみてください。
    </div>`}

    ${support.length ? `<div class="cta-box">
      <div class="cb-title">課題の整理を、一緒にやりませんか</div>
      <div class="cb-body">
        株式会社福祉マネジメント＆デザインは、高齢者福祉・社会福祉法人の経営を支援しています。
        <b>人材育成・定着支援</b>、<b>加算算定の体制構築</b>、<b>BCP策定と実践的な訓練</b>——
        シミュレーションで浮かんだ課題は、実際の現場でもよく相談をいただく領域です。<br><br>
        まずは話を聞いてみたい、という段階でも構いません。
      </div>
      <a class="cb-btn" href="${CONTACT_URL}" target="_blank" rel="noopener">相談・お問い合わせはこちら</a>
      <div class="cb-note">※ 営業目的の一方的な連絡はいたしません</div>
    </div>` : ""}

    ${omitted > 0 ? `<div class="rep-omit">※ このほかにも ${omitted} 件の課題が見つかりましたが、
      特に影響の大きいものに絞って表示しています。</div>` : ""}

    <div class="rep-replay">
      <div class="rr-title">もう一度、別の方針で試してみませんか</div>
      <div class="rr-body">
        ${totalPl >= 0
          ? "今回は黒字でした。では、受入層を変えたら？　人員を絞ったら？　同じ結果にはなりません。"
          : "今回はうまくいきませんでした。どこで間違えたのか、方針を変えて確かめてみてください。"}
        経営に唯一の正解はなく、<b>自事業所の状況によって正解が変わります。</b>それを確かめるのが、このツールの目的です。
      </div>
      <button class="cta" data-act="restart">別の方針でもう一度プレイする</button>
    </div>
  </div></div>`;
}

document.addEventListener("DOMContentLoaded", render);

</script>
</body>
</html>
